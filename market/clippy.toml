msrv = "1.93.0"
# clippy 1.95 stopped exempting #[cfg(test)] code from unwrap_used/expect_used;
# unwrap/expect in tests is accepted style here (production code stays denied).
allow-unwrap-in-tests = true
allow-expect-in-tests = true
cognitive-complexity-threshold = 30
too-many-arguments-threshold = 8
type-complexity-threshold = 300
